<h2>Creating pages</h2>
<p>AxoNet runs through GitHub, at <a href="https://github.com/AxoWasTaken/AxoNet">https://github.com/AxoWasTaken/AxoNet/</a>. Assuming you know how GitHub works, create a file named <code>index.html</code> and place it in a folder with a unique and descriptive name that describes your site. Write in the HTML for your site in that file, commit, and bam! You've got an AxoNet site. Please make sure that you don't add, edit, or remove anything at the root of the repository (as it is reserved for official AxoNet pages). If you want to you can also add a styling with a <code>.css</code> file. Also make sure that all images and assets for your site are foldered nicely, don't want a repeat of the Unison website 🤣.</p>
